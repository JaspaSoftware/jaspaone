name: Build and Deploy to Azure (Monorepo)

on:
  push:
    branches:
      - main
    paths:
      - 'app/**' # Only trigger on changes inside the app folder

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, bcmath, mysql, gd, zip

      - name: Install App Dependencies
        run: |
          cd app
          mkdir -p bootstrap/cache
          mkdir -p storage/framework/cache/data
          mkdir -p storage/framework/sessions
          mkdir -p storage/framework/testing
          mkdir -p storage/framework/views
          mkdir -p storage/logs
          chmod -R 775 bootstrap/cache storage
          composer install --no-dev --optimize-autoloader
          # Uncomment if you have frontend assets inside app
          # npm install && npm run prod

      - name: Upload App artifact
        uses: actions/upload-artifact@v4
        with:
          name: laravel-app
          path: app # Only upload the app folder contents

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download App artifact
        uses: actions/download-artifact@v4
        with:
          name: laravel-app

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'JaspaOne' # REPLACE with your actual Azure App Service name
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: . # Deploys the downloaded 'app' content to the root
